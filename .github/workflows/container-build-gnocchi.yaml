---
name: Create and publish a gnocchi image

permissions:
  actions: read
  contents: read
  id-token: write
  packages: write
  pull-requests: write
  security-events: write

on:
  pull_request:
    paths:
      - .github/workflows/container-build-gnocchi.yaml
      - ContainerFiles/gnocchi
      - scripts/gnocchi-cve-patching.sh
  schedule:
    - cron: '0 0 * * 0'  # Run Weekly at midnight UTC
  workflow_dispatch:
    inputs:
      gnocchi-version:
        description: 'Gnocchi branch to use for the build'
        required: true
        default: "master"
        type: choice
        options:
          - master
          - stable/4.6
          - stable/4.7
      project-version:
        description: 'Version of Gnocchi to build, defaults to gnocchi-version if unspecified'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gnocchi
  project_version: ${{ github.event.inputs.project-version }}
  gnocchi_version: ${{ github.event.inputs.gnocchi-version }}
  # NOTE(cloudnull): This is used to parse the workflow_dispatch inputs, sadly the inputs are not available in the
  #                   workflow_dispatch event, so they're being stored in the environment variables. This is a
  #                   workaround until there's a better way to handle this.
  gnocchi_versions: >
    ["stable/4.6", "stable/4.7"]

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      gnocchi-versions: ${{ steps.generate-matrix.outputs.gnocchi_versions }}
    steps:
      - name: generate-matrix
        id: generate-matrix
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' }}" = "true" ]; then
            gnocchi_versions="$(echo '${{ github.event.inputs.gnocchi-version }}' | jq -R '[select(length>0)]' | jq -c '.')"
          fi
          echo "gnocchi_versions=${gnocchi_versions:-${{ env.gnocchi_versions }}}" >> $GITHUB_OUTPUT
  build-and-push-image:
    needs:
      - init
    strategy:
      matrix:
        gnocchi-version: ${{ fromJSON(needs.init.outputs.gnocchi-versions)}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Dynamically set MY_DATE environment variable
        run: echo "MY_DATE=$(date +%s)" >> $GITHUB_ENV
      - name: Dynamically set OS_VERSION_PARSE environment variable
        run: |
          VERSION=$(echo -n "${{ env.project_version != '' && env.project_version || matrix.gnocchi-version }}" | awk -F'/' '{($2=="" ? x=$1 : x=$2); print x}')
          echo "OS_VERSION_PARSE=${VERSION}" >> $GITHUB_ENV
          NAME=$(echo -n "${{ env.IMAGE_NAME }}" | awk -F'/' '{print $NF}')
          echo "CATEGORY_NAME=${VERSION}-${NAME}" >> $GITHUB_ENV
      - name: Map Gnocchi branch to OpenStack constraints
        run: |
          case "${{ matrix.gnocchi-version }}" in
            master)
              echo "OS_CONSTRAINTS_REF=master" >> $GITHUB_ENV
              ;;
            stable/4.6)
              echo "OS_CONSTRAINTS_REF=unmaintained/2024.1" >> $GITHUB_ENV
              ;;
            stable/4.7)
              echo "OS_CONSTRAINTS_REF=stable/2025.1" >> $GITHUB_ENV
              ;;
            *)
              echo "OS_CONSTRAINTS_REF=master" >> $GITHUB_ENV
              ;;
          esac
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ContainerFiles/gnocchi
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:local
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GNOCCHI_VERSION=${{ env.project_version != '' && env.project_version || matrix.gnocchi-version }}
            OS_CONSTRAINTS=${{ env.OS_CONSTRAINTS_REF }}
            CACHEBUST=${{ github.sha }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        with:
          image-ref: '${{ env.IMAGE_NAME }}:local'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'
      - name: Upload Trivy scan results to GitHub Security tab
        continue-on-error: true
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: "${{ env.CATEGORY_NAME }}"
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@0.35.0
        if: ${{ github.event_name == 'pull_request' }}
        with:
          image-ref: '${{ env.IMAGE_NAME }}:local'
          output: trivy.txt
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'
      - name: Create trivy output file in markdown format
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if [[ -s trivy.txt ]]; then
              echo "### Security Output" > trivy-output.txt
              echo '```terraform' >> trivy-output.txt
              cat trivy.txt >> trivy-output.txt
              echo '```' >> trivy-output.txt
          fi
      - name: Publish Trivy Output to Summary
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if [[ -s trivy-output.txt ]]; then
            {
              cat trivy-output.txt
            } >> $GITHUB_STEP_SUMMARY
          fi
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ContainerFiles/gnocchi
          push: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.OS_VERSION_PARSE }}-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.OS_VERSION_PARSE }}-${{ env.MY_DATE }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GNOCCHI_VERSION=${{ env.project_version != '' && env.project_version || matrix.gnocchi-version }}
            OS_CONSTRAINTS=${{ env.OS_CONSTRAINTS_REF }}
            CACHEBUST=${{ github.sha }}
